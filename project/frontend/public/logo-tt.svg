<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TT</title>
  <desc>Logo TT minimalist — hệ thống quản lý hàng hóa Nhật-Việt</desc>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="#0B1F4A"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="100" x2="200" y2="100" stroke="#1A3366" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#1A3366" stroke-width="0.5"/>

  <!-- Corner accents top-left -->
  <rect x="8" y="8" width="5" height="5" rx="1" fill="#D0222B" opacity="0.8"/>
  <rect x="16" y="8" width="5" height="5" rx="1" fill="#D0222B" opacity="0.4"/>
  <rect x="8" y="16" width="5" height="5" rx="1" fill="#D0222B" opacity="0.4"/>

  <!-- Corner accents bottom-right -->
  <rect x="187" y="187" width="5" height="5" rx="1" fill="#D0222B" opacity="0.8"/>
  <rect x="179" y="187" width="5" height="5" rx="1" fill="#D0222B" opacity="0.4"/>
  <rect x="187" y="179" width="5" height="5" rx="1" fill="#D0222B" opacity="0.4"/>

  <!-- Letter T white (left) -->
  <rect x="18" y="60" width="76" height="14" rx="2" fill="#FFFFFF"/>
  <rect x="48" y="60" width="16" height="80" rx="2" fill="#FFFFFF"/>
  <rect x="48" y="136" width="16" height="4" rx="2" fill="#D0222B"/>

  <!-- Letter T red (right) -->
  <rect x="106" y="60" width="76" height="14" rx="2" fill="#D0222B"/>
  <rect x="136" y="60" width="16" height="80" rx="2" fill="#D0222B"/>
  <rect x="136" y="136" width="16" height="4" rx="2" fill="#FFFFFF"/>
</svg>
